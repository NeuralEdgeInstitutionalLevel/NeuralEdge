<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NeuralEdge AI - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #08030a;
            --card: rgba(12,5,15,0.6);
            --border: rgba(155,35,53,0.12);
            --text: #e8eaf0;
            --dim: #7a7f94;
            --muted: #3e4259;
            --accent: #9b2335;
            --accent-light: #c4666e;
            --green: #10b981;
            --red: #ef4444;
            --font: 'DM Sans', system-ui, sans-serif;
            --mono: 'JetBrains Mono', monospace;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font);
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-wrap {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .logo {
            text-align: center;
            margin-bottom: 40px;
        }
        .logo-icon {
            width: 48px; height: 48px;
            background: linear-gradient(135deg, #9b2335, #6b1d3a);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            font-weight: 800;
            color: #fff;
            margin-bottom: 16px;
        }
        .logo h1 {
            font-size: 1.5rem;
            font-weight: 800;
        }
        .logo h1 span { color: var(--accent-light); }
        .logo p {
            font-size: 0.8rem;
            color: var(--dim);
            margin-top: 6px;
        }
        .card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 36px 32px;
            backdrop-filter: blur(12px);
        }
        .tabs {
            display: flex;
            gap: 0;
            margin-bottom: 28px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .tab {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--dim);
            cursor: pointer;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
            background: none;
            border-top: none; border-left: none; border-right: none;
        }
        .tab.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }
        .tab:hover { color: var(--text); }
        .form { display: none; }
        .form.active { display: block; }
        .field {
            margin-bottom: 18px;
        }
        .field label {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }
        .field input {
            width: 100%;
            padding: 14px 16px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 12px;
            color: var(--text);
            font-family: var(--font);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .field input:focus {
            border-color: rgba(155,35,53,0.4);
            box-shadow: 0 0 20px rgba(155,35,53,0.08);
        }
        .field input::placeholder { color: var(--muted); }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #9b2335, #6b1d3a);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-family: var(--font);
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(155,35,53,0.25);
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.2);
            color: #ef4444;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 16px;
            display: none;
        }
        .success {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.2);
            color: #10b981;
            padding: 10px 14px;
            border-radius: 10px;
            font-size: 0.8rem;
            margin-bottom: 16px;
            display: none;
        }
        .forgot {
            text-align: center;
            margin-top: 16px;
        }
        .forgot a {
            color: var(--dim);
            font-size: 0.78rem;
            text-decoration: none;
        }
        .forgot a:hover { color: var(--accent-light); }
        .back {
            text-align: center;
            margin-top: 24px;
        }
        .back a {
            color: var(--dim);
            font-size: 0.8rem;
            text-decoration: none;
        }
        .back a:hover { color: var(--accent-light); }
    </style>
</head>
<body>
    <div class="login-wrap">
        <div class="logo">
            <div class="logo-icon">N</div>
            <h1>Neural<span>Edge</span> AI</h1>
            <p>Institutional-Grade Crypto Trading</p>
        </div>

        <div class="card">
            <div class="tabs">
                <button class="tab active" onclick="switchTab('login')">Sign In</button>
                <button class="tab" onclick="switchTab('register')">Create Account</button>
            </div>

            <div id="error" class="error"></div>
            <div id="success" class="success"></div>

            <!-- LOGIN FORM -->
            <div id="loginForm" class="form active">
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="loginEmail" placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="loginPass" placeholder="Enter password" autocomplete="current-password">
                </div>
                <button class="btn" onclick="doLogin()" id="loginBtn">Sign In</button>
                <div class="forgot"><a href="#">Forgot password?</a></div>
            </div>

            <!-- REGISTER FORM -->
            <div id="registerForm" class="form">
                <div class="field">
                    <label>Display Name</label>
                    <input type="text" id="regName" placeholder="Your name" autocomplete="name">
                </div>
                <div class="field">
                    <label>Email</label>
                    <input type="email" id="regEmail" placeholder="your@email.com" autocomplete="email">
                </div>
                <div class="field">
                    <label>Password</label>
                    <input type="password" id="regPass" placeholder="Min 8 characters" autocomplete="new-password">
                </div>
                <button class="btn" onclick="doRegister()" id="regBtn">Create Account</button>
            </div>
        </div>

        <div class="back"><a href="index.html">&larr; Back to NeuralEdge AI</a></div>
    </div>

    <script>
    // API base - change to production URL when deployed
    const API = window.location.hostname === 'localhost' ? 'http://localhost:8000/api' : 'https://api.neuraledge.ai/api';

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i === (tab==='login'?0:1)));
        document.getElementById('loginForm').classList.toggle('active', tab==='login');
        document.getElementById('registerForm').classList.toggle('active', tab==='register');
        hideMessages();
    }

    function showError(msg) {
        const el = document.getElementById('error');
        el.textContent = msg; el.style.display = 'block';
        document.getElementById('success').style.display = 'none';
    }
    function showSuccess(msg) {
        const el = document.getElementById('success');
        el.textContent = msg; el.style.display = 'block';
        document.getElementById('error').style.display = 'none';
    }
    function hideMessages() {
        document.getElementById('error').style.display = 'none';
        document.getElementById('success').style.display = 'none';
    }

    async function doLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const pass = document.getElementById('loginPass').value;
        if (!email || !pass) return showError('Please fill in all fields');

        const btn = document.getElementById('loginBtn');
        btn.disabled = true; btn.textContent = 'Signing in...';

        try {
            const r = await fetch(API + '/auth/login', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password: pass})
            });
            const data = await r.json();
            if (!r.ok) throw new Error(data.detail || 'Login failed');

            localStorage.setItem('ne_token', data.access_token);
            localStorage.setItem('ne_refresh', data.refresh_token);
            window.location.href = 'dashboard.html';
        } catch(e) {
            showError(e.message);
            btn.disabled = false; btn.textContent = 'Sign In';
        }
    }

    async function doRegister() {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const pass = document.getElementById('regPass').value;
        if (!name || !email || !pass) return showError('Please fill in all fields');
        if (pass.length < 8) return showError('Password must be at least 8 characters');

        const btn = document.getElementById('regBtn');
        btn.disabled = true; btn.textContent = 'Creating account...';

        try {
            const r = await fetch(API + '/auth/register', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({email, password: pass, display_name: name})
            });
            const data = await r.json();
            if (!r.ok) throw new Error(data.detail || 'Registration failed');

            showSuccess('Account created! You can now sign in.');
            switchTab('login');
            document.getElementById('loginEmail').value = email;
        } catch(e) {
            showError(e.message);
            btn.disabled = false; btn.textContent = 'Create Account';
        }
    }

    // Enter key submits
    document.getElementById('loginPass').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
    document.getElementById('regPass').addEventListener('keydown', e => { if(e.key==='Enter') doRegister(); });

    // If already logged in, redirect
    if (localStorage.getItem('ne_token')) window.location.href = 'dashboard.html';
    </script>
</body>
</html>
